<div class="signuppage">
  <div class="auth-container">
  <h2>Create Account</h2>
  <p class="subtitle">Join our community of curious minds and open hearts.</p>
  <form (ngSubmit)="register()">
    <input type="text" placeholder="Name" [(ngModel)]="name" name="name" required>
    <input type="text" placeholder="Username" [(ngModel)]="username" name="username" required>
    <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required>
    <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required>
    <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a routerLink="/signin">Sign In</a></p>
    <p *ngIf="error" class="error">{{ error }}</p>
  </div>
</div>
